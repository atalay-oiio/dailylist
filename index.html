<!DOCTYPE html>

<html lang="en">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JS Todo App</title>

    <link rel="stylesheet" href="style.css">

</head>



<body>

    <div class="app-container">

        <div class="todo-card">

            <h1>List of daily tasks</h1>

            <p class="subtitle">Track your daily tasks and complete them with ease</p>



            <div class="input-row">

                <input type="text" id="input" placeholder="like : curse JavaScript">

                <button id="btn">Add</button>

            </div>

            <ul id="taskList">

            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
